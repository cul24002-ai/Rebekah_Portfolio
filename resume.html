        <section class="contact-section">
            <h2>Get In Touch</h2>
            <p>Interested in collaborating or discussing potential employment opportunities? Please reach out via the interface below.</p>
            
            <!-- Working Formspree Integration Added Below -->
            <form action="https://formspree.io/f/xaqgdggv" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn">Send Message</button>
            </form>
        </section>
